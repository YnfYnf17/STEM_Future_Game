<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Future Explorer AI Lab</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:linear-gradient(135deg,#5c6bc0,#8e24aa);
color:white;
text-align:center;
}

header{
padding:20px;
background:rgba(0,0,0,0.2);
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.stage{display:none}
.active{display:block}

/* MAP */

.map{
display:flex;
justify-content:center;
gap:60px;
margin-top:40px;
}

.node{

width:110px;
height:110px;
border-radius:50%;
background:#ffca28;
color:black;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
transition:0.3s;

}

.node:hover{
transform:scale(1.1)
}

.locked{
background:#aaa;
cursor:not-allowed
}

/* CARDS */

.card{

background:white;
color:black;
padding:20px;
border-radius:14px;
margin:20px auto;
width:800px;
box-shadow:0 8px 25px rgba(0,0,0,0.3)

}

/* BUTTON */

button{

background:#ff7043;
border:none;
padding:12px 20px;
border-radius:8px;
color:white;
cursor:pointer;
margin:10px;
font-size:16px;

}

button:hover{
background:#f4511e
}

/* CHOICE */

.choice-grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;

}

.choice-btn{

background:#42a5f5;

}

.choice-btn:hover{

background:#1e88e5

}

/* AI CHAT */

#assistant{

position:fixed;
bottom:20px;
right:20px;
background:white;
color:black;
width:300px;
border-radius:12px;
padding:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.4);

}

#chatBox{

height:180px;
overflow-y:auto;
border:1px solid #ddd;
padding:6px;
margin-bottom:6px;
background:#fafafa;
font-size:14px;

}

/* BADGES */

.badge{

display:inline-block;
background:#66bb6a;
padding:8px;
border-radius:8px;
margin:5px;

}

</style>

</head>

<body>

<header>

<h1>🚀 Future Explorer AI Lab</h1>

<p>Explore data → Analyze with AI → Predict the future</p>

</header>

<div class="container">

<!-- MAP -->

<div id="map" class="stage active">

<div class="card">

<h2>🌍 Future Exploration Map</h2>

<div class="map">

<div class="node" onclick="startLevel()">Energy</div>

<div class="node locked">AI Jobs</div>

<div class="node locked">Future Cities</div>

</div>

</div>

</div>

<!-- STAGE1 -->

<div id="stage1" class="stage">

<div class="card">

<h2>Stage 1: Explore Data</h2>

<button onclick="showData(1)">Energy Demand</button>

<button onclick="showData(2)">Solar Cost</button>

<button onclick="showData(3)">CO2 Emissions</button>

<button onclick="showData(4)">Battery Tech</button>

<canvas id="chart" width="500"></canvas>

<div id="dataText"></div>

<button onclick="nextStage()">AI Analysis</button>

</div>

</div>

<!-- STAGE2 -->

<div id="stage2" class="stage">

<div class="card">

<h2>Stage 2: AI Trend Analysis</h2>

<div id="aiAnalysis"></div>

<button onclick="goStage3()">Predict the Future</button>

</div>

</div>

<!-- STAGE3 -->

<div id="stage3" class="stage">

<div class="card">

<h2>Stage 3: Your Future Prediction</h2>

<h3>Which job may disappear?</h3>

<div class="choice-grid">

<button class="choice-btn" onclick="chooseDisappear('taxi')">Taxi Driver</button>

<button class="choice-btn" onclick="chooseDisappear('cashier')">Cashier</button>

<button class="choice-btn" onclick="chooseDisappear('teacher')">Teacher</button>

<button class="choice-btn" onclick="chooseDisappear('solar')">Solar Engineer</button>

</div>

<p id="feedback1" style="margin-top:10px;"></p>

<h3>Which industry will grow?</h3>

<div class="choice-grid">

<button class="choice-btn" onclick="chooseGrow('ai')">AI Industry</button>

<button class="choice-btn" onclick="chooseGrow('renewable')">Renewable Energy</button>

<button class="choice-btn" onclick="chooseGrow('coal')">Coal</button>

<button class="choice-btn" onclick="chooseGrow('robotics')">Robotics</button>

</div>

<p id="feedback2" style="margin-top:10px;"></p>

<button onclick="predict()">Submit Prediction</button>

</div>

<div id="result" class="card"></div>

<button onclick="downloadReport()">Download PDF Report</button>

</div>

</div>

<!-- AI ASSISTANT -->

<div id="assistant">

<h3>🤖 NOVA AI</h3>

<div id="chatBox"></div>

<input id="chatInput" placeholder="Ask about future jobs..." style="width:70%">

<button onclick="sendMessage()">Send</button>

</div>

<script>

const API_KEY="sk-08fb0f31f94f4aa6ae6e2c55f61e5b25"

let viewedData=0
let disappearChoice=""
let growChoice=""
let chart

function startLevel(){

map.classList.remove("active")
stage1.classList.add("active")

}

function showData(id){

viewedData++

let ctx=document.getElementById("chart")

if(chart) chart.destroy()

/* 1 能源需求 */

if(id==1){

chart=new Chart(ctx,{
type:'line',
data:{
labels:["2000","2005","2010","2015","2020","2025"],
datasets:[{
label:"Global Energy Demand",
data:[100,110,125,140,155,190]
}]
}
})

dataText.innerHTML="Global energy demand has been rising due to population growth and economic development."

}

/* 2 太阳能成本 */

if(id==2){

chart=new Chart(ctx,{
type:'line',
data:{
labels:["2010","2013","2016","2019","2022","2025"],
datasets:[{
label:"Solar Cost ($/W)",
data:[4,3,2,1.2,0.8,0.5]
}]
}
})

dataText.innerHTML="Solar energy cost has dropped dramatically due to technology improvements."

}

/* 3 CO2排放 */

if(id==3){

chart=new Chart(ctx,{
type:'bar',
data:{
labels:["2000","2005","2010","2015","2020"],
datasets:[{
label:"Global CO2 Emissions",
data:[25,28,31,33,34]
}]
}
})

dataText.innerHTML="CO₂ emissions continue increasing but the growth is slowing in many regions."

}

/* 4 电池技术 */

if(id==4){

chart=new Chart(ctx,{
type:'line',
data:{
labels:["2010","2013","2016","2019","2022","2025"],
datasets:[{
label:"Battery Energy Density (Wh/kg)",
data:[120,150,180,210,250,300]
}]
}
})

dataText.innerHTML="Battery technology is rapidly improving, enabling electric vehicles and renewable energy storage."

}

}

async function nextStage() {
  stage1.classList.remove("active");
  stage2.classList.add("active");
  
  
let text="<b>AI Analysis Report</b><br><br>"

text+="Trend Observations:<br>"
text+="• Energy demand increases globally.<br>"
text+="• Renewable technology costs drop.<br>"

text+="<br>Uncertainty:<br>"
text+="• Government policy may change investment.<br>"
text+="• New technologies may appear.<br>"

text+="<br>Possible Future Scenarios:<br>"
text+="Scenario A: Renewable transition.<br>"
text+="Scenario B: Mixed energy system.<br>"
text+="Scenario C: Tech breakthroughs.<br><br>"

text+="<b>Live AI Analysis:</b><br>AI analyzing trends...<br><br>"

aiAnalysis.innerHTML=text

  
  try {
    let response = await fetch("http://localhost:3000/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
        // 注意：不需要再添加 Authorization 头，因为API密钥在服务器端
      },
      body: JSON.stringify({
        model: "deepseek-chat",
        messages: [
          {
            role: "system",
            content: "Explain technology trends to middle school students."
          },
          {
            role: "user",
            content: "Energy demand is rising while solar energy cost is falling. What future trends might happen?"
          }
        ]
      })
    });
    
    if (!response.ok) {
      throw new Error(`HTTP error ${response.status}`);
    }
    
    let data = await response.json();
    aiAnalysis.innerHTML += data.choices[0].message.content;
    
  } catch (error) {
    console.error("API调用失败:", error);
    aiAnalysis.innerHTML += "<br><b>AI connection failed.</b><br>Showing default analysis above.<br>Error: " + error.message;
  }
}

function goStage3(){

stage2.classList.remove("active")
stage3.classList.add("active")

}

function chooseDisappear(x){

disappearChoice=x

let messages={
taxi:"🚗 Interesting! Self-driving cars may reduce taxi jobs.",
cashier:"🛒 Good point! Automation and self-checkout may replace cashiers.",
teacher:"📚 Teachers are unlikely to disappear because education still needs humans.",
solar:"☀ Solar engineers will likely grow with renewable energy."
}

document.getElementById("feedback1").innerHTML=messages[x]

}

function chooseGrow(x){

growChoice=x

let messages={
ai:"🤖 AI industries are expanding rapidly.",
renewable:"🌱 Renewable energy is one of the fastest growing industries.",
coal:"⚠ Coal is declining in many regions due to climate policies.",
robotics:"🤖 Robotics will grow with automation."
}

document.getElementById("feedback2").innerHTML=messages[x]

}

async 
function predict(){

let score=viewedData*10

let explanation=""

if(disappearChoice=="taxi"){
score+=20
explanation+="Taxi drivers may decline due to self‑driving vehicles.<br>"
}

if(disappearChoice=="cashier"){
score+=20
explanation+="Automation and self‑checkout systems may replace cashier jobs.<br>"
}

if(growChoice=="ai"){
score+=20
explanation+="AI industries are expanding rapidly across many sectors.<br>"
}

if(growChoice=="renewable"){
score+=20
explanation+="Renewable energy is growing because countries want cleaner energy.<br>"
}

if(growChoice=="robotics"){
score+=20
explanation+="Robotics will grow as automation spreads in factories and services.<br>"
}

let praise=""
let reflection=""

if(score>=80){
praise="🏆 Excellent Future Analyst!"
reflection="Your prediction matches many current technology and energy trends. You connected automation and renewable growth with real data. Think further: how might government policy or new technology change these trends?"
}

else if(score>=50){
praise="👍 Good Prediction!"
reflection="You noticed some important trends, but future systems are complex. Consider how multiple technologies interact—for example AI + energy + robotics together shaping new industries."
}

else{
praise="🤔 Interesting Attempt!"
reflection="Your prediction shows curiosity, but try exploring more data before deciding. Think about global energy demand, technology cost changes, and environmental policy."
}

let extraThink="<br><br><b>Further Thinking:</b><br>"
extraThink+="• What new jobs might appear because of AI and renewable energy?<br>"
extraThink+="• How might education change to prepare people for future jobs?<br>"
extraThink+="• Could unexpected technologies change today's predictions?"

let feedback="<h2>"+praise+"</h2>"
feedback+="Score: "+score+"/100<br><br>"
feedback+="<b>Why this result:</b><br>"+explanation
feedback+="<br><b>Reflection:</b><br>"+reflection
feedback+=extraThink

result.innerHTML=feedback

}


async function sendMessage() {
  let input = document.getElementById("chatInput");
  let message = input.value.trim();
  
  if (message === "") return;
  
  addMessage("Student", message);
  input.value = "";
  
  try {
    let response = await fetch("http://localhost:3000/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "deepseek-chat",
        messages: [
          {
            role: "system",
            content: "You are NOVA, an AI teacher helping middle school students understand future technology and jobs."
          },
          {
            role: "user",
            content: message
          }
        ],
        temperature: 0.7
      })
    });
    
    if (!response.ok) {
      throw new Error(`HTTP error ${response.status}`);
    }
    
    let data = await response.json();
    let reply = data.choices[0].message.content;
    addMessage("NOVA", reply);
    
  } catch (error) {
    console.error("聊天失败:", error);
    addMessage("System", "AI连接失败: " + error.message);
  }
}

function addMessage(sender,text){

let box=document.getElementById("chatBox")

let p=document.createElement("p")

p.innerHTML="<b>"+sender+":</b> "+text

box.appendChild(p)

box.scrollTop=box.scrollHeight

}

function downloadReport(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

doc.text("Future Explorer Report",20,20)

doc.text("Data explored: "+viewedData,20,40)

doc.text("Job predicted to disappear: "+disappearChoice,20,60)

doc.text("Industry predicted to grow: "+growChoice,20,80)

doc.save("Future_Report.pdf")

}

</script>

</body>
</html>
